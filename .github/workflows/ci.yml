name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  # Quick smoke test: verify the server starts and --doctor works
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci
      - run: npm run build

      # Verify --doctor mode runs without crashing (will fail checks but should NOT crash)
      - name: Test --doctor mode
        run: |
          node dist/index.js --doctor 2>&1 || true
          echo "✅ --doctor mode executed without crashing"
